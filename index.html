<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профориентация с мемами | Найди свою профессию</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            min-height: 550px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .screen {
            display: none;
            padding: 30px 25px;
            animation: fadeIn 0.4s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 32px;
            margin-bottom: 15px;
            color: #333;
            text-align: center;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        h3 {
            margin: 25px 0 12px 0;
            color: #555;
            font-size: 18px;
        }

        p {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
            text-align: center;
        }

        .btn-primary, .btn-secondary {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-primary:hover, .btn-secondary:hover {
            transform: scale(1.02);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .options-grid {
            display: grid;
            gap: 12px;
            margin: 25px 0;
        }

        .option-btn {
            padding: 16px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .option-btn:hover {
            border-color: #667eea;
            background: #f0f0ff;
            transform: translateX(5px);
        }

        .quiz-footer {
            text-align: center;
            color: #999;
            margin-top: 20px;
            font-size: 14px;
        }

        .superpower-card {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .profession-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0;
            border-left: 4px solid #667eea;
        }

        .profession-level {
            font-size: 12px;
            color: #667eea;
            font-weight: bold;
            text-transform: uppercase;
        }

        .profession-name {
            font-size: 18px;
            font-weight: bold;
            margin: 5px 0;
            color: #333;
        }

        .profession-desc {
            font-size: 14px;
            color: #666;
        }

        .roadmap-step {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0;
        }

        .roadmap-time {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .roadmap-steps {
            list-style: none;
            padding-left: 20px;
        }

        .roadmap-steps li {
            margin: 8px 0;
            color: #555;
            font-size: 14px;
        }

        .result-buttons {
            margin-top: 25px;
        }

        .meme-emoji {
            font-size: 80px;
            text-align: center;
            margin-bottom: 10px;
        }

        @media (max-width: 480px) {
            .screen {
                padding: 25px 20px;
            }
            h1 {
                font-size: 26px;
            }
            h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- ЭКРАН 1: ПРИВЕТСТВИЕ -->
        <div id="welcome-screen" class="screen active">
            <div class="meme-emoji">
                🎯🧠🔥
            </div>
            <h1>Кем тебе быть?</h1>
            <p>Ответь на 3 мемных вопроса и получи стратегию своей мечты + конкретные шаги!</p>
            <button id="start-btn" class="btn-primary">🚀 Начать тест</button>
        </div>

        <!-- ЭКРАН 2: ВОПРОСЫ -->
        <div id="quiz-screen" class="screen">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <h2 id="question-text"></h2>
            <div id="options-container" class="options-grid"></div>
            <div class="quiz-footer">
                <span id="question-counter"></span>
            </div>
        </div>

        <!-- ЭКРАН 3: РЕЗУЛЬТАТ -->
        <div id="result-screen" class="screen">
            <div class="meme-emoji" id="result-emoji">🏆</div>
            <h2 id="meme-diagnosis"></h2>
            
            <div class="superpower-card">
                <h3>✨ Твоя суперсила</h3>
                <p id="superpower"></p>
            </div>

            <h3>🎯 ТОП-3 профессии для тебя</h3>
            <div id="top3-list"></div>

            <h3>🗺️ Пошаговая стратегия</h3>
            <div id="roadmap-list"></div>

            <div class="result-buttons">
                <button id="restart-btn" class="btn-secondary">🔄 Пройти заново</button>
            </div>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ ТЕСТА ==========
        const questions = [
            {
                text: "🤖 Что ты делаешь, когда видишь сломанный автомат с кофе?",
                options: [
                    { text: "🔧 Пытаюсь починить, пока никто не видит", scores: { tech: 3 } },
                    { text: "🗣️ Зову администратора и объясняю проблему", scores: { human: 3 } },
                    { text: "📸 Фоткаю и выкладываю в TikTok с мемом", scores: { art: 3 } },
                    { text: "🚶 Ухожу в другой автомат, не парюсь", scores: { nature: 1 } }
                ]
            },
            {
                text: "💭 Твой идеальный рабочий день — это...",
                options: [
                    { text: "💻 Сижу в наушниках, пишу код, никто не трогает", scores: { tech: 3, sign: 2 } },
                    { text: "🤝 Общаюсь с людьми, решаю их проблемы", scores: { human: 3 } },
                    { text: "🎨 Рисую/создаю что-то красивое", scores: { art: 3 } },
                    { text: "🌿 Работаю на свежем воздухе с растениями/животными", scores: { nature: 3 } }
                ]
            },
            {
                text: "⚡ Как ты реагируешь на сложную задачу?",
                options: [
                    { text: "📋 Составляю план, разбиваю на шаги", scores: { tech: 2, sign: 2 } },
                    { text: "👥 Зову команду, вместе решаем", scores: { human: 3 } },
                    { text: "💡 Ищу креативный нестандартный подход", scores: { art: 3 } },
                    { text: "😴 Забиваю, откладываю на потом", scores: { nature: 0 } }
                ]
            }
        ];

        // Стратегии для разных типов
        const strategies = {
            tech: {
                emoji: "🤓",
                diagnosis: "Технарь-интроверт, который гуглит ошибки быстрее, чем говорит «привет»",
                superpower: "Системное мышление и любовь к алгоритмам",
                top3: [
                    { level: "🧸 На попробовать", name: "Тестировщик", desc: "Ломать системы и находить баги — твоё скрытое удовольствие" },
                    { level: "🚀 Для души и денег", name: "Разработчик", desc: "Создавать продукты, которыми пользуются миллионы" },
                    { level: "🌙 Мечта", name: "Архитектор ПО", desc: "Проектировать сложные системы с нуля" }
                ],
                roadmap: [
                    { time: "📅 Ближайшая неделя", steps: ["Попробуй бесплатный курс на Stepik «Основы программирования»", "Установи VS Code и напиши первую программу «Hello World»"] },
                    { time: "📅 1-3 месяца", steps: ["Реши 10 задач на Codewars", "Сделай простой проект (калькулятор, бота в Telegram)"] },
                    { time: "📅 3-12 месяцев", steps: ["Пройди курс Яндекс Практикум «Веб-разработчик»", "Найди стажировку или первые заказы на фрилансе"] }
                ]
            },
            human: {
                emoji: "🎭",
                diagnosis: "Душа компании, которая знает всех по именам и помнит дни рождения",
                superpower: "Эмпатия и навыки коммуникации",
                top3: [
                    { level: "🧸 На попробовать", name: "HR-менеджер", desc: "Находить таланты и помогать им расти" },
                    { level: "🚀 Для души и денег", name: "Продакт-менеджер", desc: "Понимать потребности пользователей и создавать продукты" },
                    { level: "🌙 Мечта", name: "CEO стартапа", desc: "Вдохновлять команду и вести к большим целям" }
                ],
                roadmap: [
                    { time: "📅 Ближайшая неделя", steps: ["Посмотри видео «Как устроен HR» на YouTube", "Проведи опрос среди друзей, что им нравится в работе"] },
                    { time: "📅 1-3 месяца", steps: ["Пройди курс по коммуникациям на Coursera", "Попробуй себя в роли организатора мероприятия"] },
                    { time: "📅 3-12 месяцев", steps: ["Найди ментора в профессии", "Подай резюме на стажировку в HR-отдел"] }
                ]
            },
            art: {
                emoji: "🎨",
                diagnosis: "Креативный визионер, который видит искусство даже в луже",
                superpower: "Творческое мышление и чувство прекрасного",
                top3: [
                    { level: "🧸 На попробовать", name: "Графический дизайнер", desc: "Создавать визуалы для соцсетей и рекламы" },
                    { level: "🚀 Для души и денег", name: "Motion-дизайнер", desc: "Оживлять графику и делать крутую анимацию" },
                    { level: "🌙 Мечта", name: "Арт-директор", desc: "Управлять творческой командой и задавать стиль" }
                ],
                roadmap: [
                    { time: "📅 Ближайшая неделя", steps: ["Скачай Figma (бесплатно) и сделай свой первый постер", "Посмотри уроки по композиции и цвету на YouTube"] },
                    { time: "📅 1-3 месяца", steps: ["Сделай 5 работ в портфолио (логотипы, постеры, анимации)", "Найди первых клиентов на фрилансе (Kwork, FL.ru)"] },
                    { time: "📅 3-12 месяцев", steps: ["Пройди курс по Motion-дизайну", "Собери крутое портфолио и иди в студию"] }
                ]
            },
            nature: {
                emoji: "🌿",
                diagnosis: "Спокойный наблюдатель, который чувствует природу",
                superpower: "Внимание к деталям и терпение",
                top3: [
                    { level: "🧸 На попробовать", name: "Ландшафтный дизайнер", desc: "Создавать красивые сады и парки" },
                    { level: "🚀 Для души и денег", name: "Эколог", desc: "Помогать природе и получать за это деньги" },
                    { level: "🌙 Мечта", name: "Биолог-исследователь", desc: "Изучать живые организмы и делать открытия" }
                ],
                roadmap: [
                    { time: "📅 Ближайшая неделя", steps: ["Почитай книгу «Тихая весна»", "Сходи в ботанический сад или парк"] },
                    { time: "📅 1-3 месяца", steps: ["Запишись на курс по экологии", "Начни вести блог о природе"] }
                ]
            }
        };
        strategies.default = strategies.human;

        // Состояние
        let currentQuestion = 0;
        let userAnswers = [];
        let resultData = null;

        // DOM элементы
        const welcomeScreen = document.getElementById('welcome-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        // Подсчёт результатов
        function calculateResults() {
            const scores = { human: 0, tech: 0, sign: 0, art: 0, nature: 0 };
            
            userAnswers.forEach((answer, index) => {
                const q = questions[index];
                const selected = q.options[answer];
                if (selected && selected.scores) {
                    Object.keys(selected.scores).forEach(cat => {
                        if (scores[cat] !== undefined) scores[cat] += selected.scores[cat];
                    });
                }
            });
            
            let maxScore = 0;
            let dominantType = 'human';
            Object.keys(scores).forEach(type => {
                if (scores[type] > maxScore) {
                    maxScore = scores[type];
                    dominantType = type;
                }
            });
            
            return strategies[dominantType] || strategies.default;
        }

        // Отображение вопроса
        function displayQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-text').innerHTML = q.text;
            document.getElementById('question-counter').innerHTML = `${currentQuestion+1} / ${questions.length}`;
            
            const progress = ((currentQuestion+1) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = opt.text;
                btn.onclick = () => {
                    userAnswers.push(idx);
                    if (currentQuestion + 1 < questions.length) {
                        currentQuestion++;
                        displayQuestion();
                    } else {
                        resultData = calculateResults();
                        displayResults();
                    }
                };
                container.appendChild(btn);
            });
        }

        // Отображение результатов
        function displayResults() {
            document.getElementById('result-emoji').innerHTML = resultData.emoji;
            document.getElementById('meme-diagnosis').innerHTML = resultData.diagnosis;
            document.getElementById('superpower').innerHTML = resultData.superpower;
            
            const top3Container = document.getElementById('top3-list');
            top3Container.innerHTML = '';
            resultData.top3.forEach(prof => {
                top3Container.innerHTML += `
                    <div class="profession-card">
                        <div class="profession-level">${prof.level}</div>
                        <div class="profession-name">${prof.name}</div>
                        <div class="profession-desc">${prof.desc}</div>
                    </div>
                `;
            });
            
            const roadmapContainer = document.getElementById('roadmap-list');
            roadmapContainer.innerHTML = '';
            resultData.roadmap.forEach(step => {
                roadmapContainer.innerHTML += `
                    <div class="roadmap-step">
                        <div class="roadmap-time">${step.time}</div>
                        <ul class="roadmap-steps">
                            ${step.steps.map(s => `<li>✅ ${s}</li>`).join('')}
                        </ul>
                    </div>
                `;
            });
            
            quizScreen.classList.remove('active');
            resultScreen.classList.add('active');
        }

        // Перезапуск
        function restartQuiz() {
            currentQuestion = 0;
            userAnswers = [];
            resultData = null;
            resultScreen.classList.remove('active');
            welcomeScreen.classList.add('active');
        }

        // Старт
        function startQuiz() {
            currentQuestion = 0;
            userAnswers = [];
            welcomeScreen.classList.remove('active');
            quizScreen.classList.add('active');
            displayQuestion();
        }

        startBtn.onclick = startQuiz;
        restartBtn.onclick = restartQuiz;
    </script>
</body>
</html>
